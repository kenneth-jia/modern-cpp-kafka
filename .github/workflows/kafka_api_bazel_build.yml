name: '[Kafka API] Bazel Build'

on:
  pull_request:
  push:
    branches:
      - main

env:
  KAFKA_SRC_LINK: https://www.apache.org/dyn/closer.lua/kafka/4.2.0/kafka_2.13-4.2.0.tgz?action=download
  CPU_CORE_NUM:   2
  LIBRDKAFKA_TAG: v2.14.1

jobs:
  kafka-api-bazel-build:
    runs-on: ${{ matrix.os }}

    env:
      OS_VERSION:        ${{ matrix.os }}
      TEST_LABELS:       ${{ matrix.test-labels }}

    strategy:
      matrix:
        include:
          - os:                macos-26
            test-labels:       unit,integration
            #test-labels:       robustness
          - os:                ubuntu-24.04
            test-labels:       unit,integration

    steps:
      - uses: actions/checkout@v3

      - name: Update the List for Available Packages
        if: contains(matrix.os, 'ubuntu')
        run: |
          sed -e 's/azure.archive.ubuntu.com/us.archive.ubuntu.com/g' -e t -e d /etc/apt/sources.list | sudo tee /etc/apt/sources.list.d/nonazure.list
          sudo apt-get update

      - name: Install Dependencies
        run: |
          # Install bazel
          if [[ ${OS_VERSION} == 'ubuntu'* ]]; then
            sudo apt install -y zlib1g-dev

            sudo apt install apt-transport-https curl gnupg -y
            curl -fsSL https://bazel.build/bazel-release.pub.gpg | gpg --dearmor >bazel-archive-keyring.gpg
            sudo mv bazel-archive-keyring.gpg /usr/share/keyrings
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/bazel-archive-keyring.gpg] https://storage.googleapis.com/bazel-apt stable jdk1.8" | sudo tee /etc/apt/sources.list.d/bazel.list
            sudo apt update && sudo apt install -y bazel
          fi

          bazel --version

          # Install new g++ version to support C++23
          if [[ ${OS_VERSION} == 'ubuntu-24.04' ]]; then
            sudo apt install -y gcc-14 g++-14
            sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
            sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
            sudo update-alternatives --set gcc /usr/bin/gcc-14
            sudo update-alternatives --set g++ /usr/bin/g++-14
            g++ --version
          fi

          # Install Jre, Kafka for integration/regression tests
          if [[ ${TEST_LABELS} == *'integration'* ]] || [[ ${TEST_LABELS} == *'robustness'* ]]; then
            # For ubuntu
            if [[ ${OS_VERSION} == 'ubuntu-24.04' ]]; then
              # Install Jre
              sudo apt install -y default-jre
              java -version

              # Install lsof
              sudo apt install -y lsof
            fi

            # Install kafka
            time wget -nv ${KAFKA_SRC_LINK}
            mkdir -p kafka && tar -xzf `basename ${KAFKA_SRC_LINK}` -C kafka --strip-components=1
            export PATH=`pwd`/kafka/bin:$PATH

            # Save the PATH to environment file
            echo "PATH=${PATH}" >> $GITHUB_ENV
          fi

      - name: Build
        run: |
          bazel build //...

      - name: Test
        if: matrix.test-labels
        timeout-minutes: 15
        run: |
          # Restore the PATH from environment file
          export PATH=${{ env.PATH }}

          # Setup Kafka cluster for integration test & regression test
          if [[ ${TEST_LABELS} == *'integration'* ]] || [[ ${TEST_LABELS} == *'robustness'* ]]; then
            # Start Kafka cluster
            rm -f test.env
            scripts/start-local-kafka-cluster.py --controller-port 52181 --broker-ports 50091 50092 50093 &

            # Wait server to be ready
            for i in {1..60}; do cat test.env 2>/dev/null && break || sleep 1; done

            # Set the environment variables: KAFKA_BROKER_LIST, KAFKA_BROKER_PIDS
            source test.env

            cat test.env
            ps aux | grep kafka

          fi

          # Run tests
          bazel test  //... --test_env=KAFKA_BROKER_LIST=$KAFKA_BROKER_LIST --test_tag_filters="${TEST_LABELS}" --test_verbose_timeout_warnings --test_output=all

          # Stop Kafka cluster for integration test & regression test
          if [[ ${TEST_LABELS} == *'integration'* ]] || [[ ${TEST_LABELS} == *'robustness'* ]]; then
            # Stop kafka cluster
            kafka-server-stop.sh
          fi

